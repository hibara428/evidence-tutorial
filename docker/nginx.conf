server {
    listen 80;
    root /usr/share/nginx/html;

    # Hide nginx version
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/html text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Content-hashed immutable assets (_app/immutable/): cache forever
    location /_app/immutable/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Other _app assets: cache 1 day
    location /_app/ {
        expires 1d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # HTML pages and other files
    # SvelteKit static: try file, then .html extension, then directory index
    location / {
        try_files $uri $uri.html $uri/index.html =404;
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }
}
